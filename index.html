<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polyrhythm Visualizer</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<style>
*,:before,:after{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;color:#fff;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;cursor:crosshair}
.pause-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:5;display:flex;justify-content:center;align-items:center;font-size:48px;letter-spacing:4px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.pause-overlay.show{opacity:1}
.controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;background:rgba(10,10,15,.8);backdrop-filter:blur(16px);padding:10px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.08);z-index:10;flex-wrap:wrap;justify-content:center;max-width:95vw}
.controls label{font-size:12px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:6px}
.controls input[type=range]{width:64px;accent-color:#6c5ce7;height:4px}
.controls button,.controls select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s;font-family:inherit;outline:none}
.controls button:hover,.controls select:hover{background:rgba(255,255,255,.12)}
.controls button.active{background:#6c5ce7;border-color:#6c5ce7}
.controls button.audio-active{background:#e17055;border-color:#e17055}
.controls button.recording{background:#d63031;border-color:#d63031;animation:pulse .8s ease-in-out infinite}
.controls select option{background:#1a1a2e;color:#fff}
.controls .count{color:#6c5ce7;font-weight:600;min-width:18px;text-align:center;font-size:12px}
.info{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.2);z-index:10;text-align:center;pointer-events:none;letter-spacing:.5px;line-height:1.6}
.kbd{display:inline-block;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:4px;font-size:10px;margin:0 1px}
.controls .sep{width:1px;height:24px;background:rgba(255,255,255,.08)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(max-width:640px){.controls{padding:8px 10px;gap:5px;bottom:12px}.controls input[type=range]{width:48px}.info{font-size:10px;top:8px}.controls .sep{display:none}}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="pause-overlay" id="pauseOverlay">⏸ PAUSED</div>

<div class="info" id="infoBar">
  click to spawn • scroll to zoom • <span class="kbd">Space</span> pause • <span class="kbd">F</span> fullscreen • share link copies state
</div>

<div class="controls" id="controls">
  <label>
    dots
    <input type="range" id="countSlider" min="2" max="30" value="6" step="1">
    <span class="count" id="countDisplay">6</span>
  </label>
  <label>
    speed
    <input type="range" id="speedSlider" min="0" max="3" value="1" step="0.05">
  </label>
  <label>
    size
    <input type="range" id="sizeSlider" min="0.3" max="3" value="1" step="0.1">
  </label>
  <div class="sep"></div>
  <select id="themeSelect">
    <option value="default">🌈 Default</option>
    <option value="cyberpunk">💀 Cyberpunk</option>
    <option value="ocean">🌊 Ocean</option>
    <option value="fire">🔥 Fire</option>
    <option value="monochrome">⚪ Monochrome</option>
  </select>
  <button id="trailsBtn" class="active">trails</button>
  <button id="glowBtn" class="active">glow</button>
  <button id="linesBtn">lines</button>
  <div class="sep"></div>
  <button id="audioBtn">🎤 mic</button>
  <button id="recordBtn">⏺ record</button>
  <button id="exportBtn">🖼 export</button>
  <div class="sep"></div>
  <button id="pauseBtn">⏸</button>
  <button id="resetBtn">↺</button>
</div>

<script>
// ============================================================
// SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
function resize() {
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  cx=W/2;cy=H/2;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// THEMES
// ============================================================
const THEMES = {
  default: {
    name:'Default',bg:'#0a0a0f',dotAlpha:'66',
    palette:['#6c5ce7','#fd79a8','#00b894','#fdcb6e','#e17055','#0984e3','#00cec9','#e84393','#f39c12','#2ecc71','#3498db','#9b59b6']
  },
  cyberpunk: {
    name:'Cyberpunk',bg:'#0a0015',dotAlpha:'88',
    palette:['#ff00ff','#00ffff','#ff006e','#8338ec','#ffbe0b','#fb5607','#3a86ff','#ff006e','#00f5d4','#f15bb5','#fee440','#9b5de5']
  },
  ocean: {
    name:'Ocean',bg:'#000a14',dotAlpha:'55',
    palette:['#0077b6','#00b4d8','#90e0ef','#48cae4','#023e8a','#0096c7','#ade8f4','#03045e','#00b4d8','#0077b6','#90e0ef','#48cae4']
  },
  fire: {
    name:'Fire',bg:'#0a0500',dotAlpha:'77',
    palette:['#ff4500','#ff6347','#ff7f50','#ff8c00','#ffa500','#ffd700','#dc143c','#b22222','#ff4500','#ff6347','#ffa500','#ffd700']
  },
  monochrome: {
    name:'Monochrome',bg:'#050505',dotAlpha:'44',
    palette:['#ffffff','#cccccc','#999999','#eeeeee','#bbbbbb','#dddddd','#aaaaaa','#888888','#ffffff','#cccccc','#999999','#777777']
  }
};
let currentTheme = 'default';

// ============================================================
// STATE
// ============================================================
let dots = [];
let trailHistory = [];
let frame = 0;
let paused = false;
let showTrails = true;
let showGlow = true;
let showLines = false;
let speedMultiplier = 1;
let sizeMultiplier = 1;
let zoom = 1;
let audioMode = false;
let recording = false;
let mediaRecorder = null;
let recordedChunks = [];
let audioCtx = null;
let analyser = null;
let audioData = null;
let micStream = null;

const DEFAULTS = [
  {speed:.5,radius:40},{speed:.8,radius:70},{speed:1,radius:100},
  {speed:1.5,radius:130},{speed:2,radius:160},{speed:3,radius:190},
];

// ============================================================
// INIT
// ============================================================
function initDots(count) {
  dots=[];trailHistory=[];frame=0;
  const theme=THEMES[currentTheme];
  for(let i=0;i<count;i++){
    const d=DEFAULTS[i%DEFAULTS.length];
    dots.push({
      angle:(i/count)*Math.PI*2,
      speed:d.speed*(i%2===0?1:-1),
      radius:d.radius*(1+i*0.04),
      color:theme.palette[i%theme.palette.length],
      baseRadius:d.radius*(1+i*0.04),
      baseSpeed:d.speed,
    });
  }
  syncStateToURL();
}

// ============================================================
// THEME APPLICATION
// ============================================================
function applyTheme(name){
  currentTheme=name;
  const theme=THEMES[name];
  document.body.style.background=theme.bg;
  for(let i=0;i<dots.length;i++){
    dots[i].color=theme.palette[i%theme.palette.length];
  }
}

// ============================================================
// AUDIO
// ============================================================
async function toggleAudio(){
  if(audioMode){deinitAudio();return}
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(micStream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    src.connect(analyser);
    audioData=new Uint8Array(analyser.frequencyBinCount);
    audioMode=true;
    audioBtn.textContent='🎤 live';
    audioBtn.classList.add('audio-active');
    if(audioCtx.state==='suspended') await audioCtx.resume();
  }catch(e){
    audioBtn.textContent='🎤 denied';
    setTimeout(()=>{audioBtn.textContent='🎤 mic'},2000);
  }
}
function deinitAudio(){
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close();
  audioCtx=null;analyser=null;audioData=null;
  audioMode=false;
  audioBtn.textContent='🎤 mic';
  audioBtn.classList.remove('audio-active');
}

// ============================================================
// RECORDING
// ============================================================
function toggleRecording(){
  if(recording){stopRecording();return}
  recordedChunks=[];
  try{
    const stream=canvas.captureStream(30);
    mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm'});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data)};
    mediaRecorder.onstop=()=>{
      const blob=new Blob(recordedChunks,{type:'video/webm'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=`polyrhythm-${Date.now()}.webm`;
      a.click();
      recordedChunks=[];
    };
    mediaRecorder.start();
    recording=true;
    recordBtn.textContent='⏹ stop';
    recordBtn.classList.add('recording');
  }catch(e){
    recordBtn.textContent='⏺ err';
    setTimeout(()=>{recordBtn.textContent='⏺ record'},2000);
  }
}
function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){
    mediaRecorder.stop();
  }
  recording=false;
  recordBtn.textContent='⏺ record';
  recordBtn.classList.remove('recording');
}

// ============================================================
// EXPORT PNG
// ============================================================
function exportPNG(){
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download=`polyrhythm-${Date.now()}.png`;
  a.click();
}

// ============================================================
// URL STATE
// ============================================================
function syncStateToURL(){
  const p=new URLSearchParams();
  p.set('count',dots.length);
  p.set('speed',speedMultiplier);
  p.set('size',sizeMultiplier);
  p.set('zoom',zoom);
  p.set('theme',currentTheme);
  p.set('trails',showTrails?1:0);
  p.set('glow',showGlow?1:0);
  p.set('lines',showLines?1:0);
  window.history.replaceState(null,'','?'+p.toString());
}
function restoreStateFromURL(){
  try{
    const p=new URLSearchParams(location.search);
    if(p.has('count')){const v=parseInt(p.get('count'));countSlider.value=v;countDisplay.textContent=v}
    if(p.has('speed')){const v=parseFloat(p.get('speed'));speedSlider.value=v;speedMultiplier=v}
    if(p.has('size')){const v=parseFloat(p.get('size'));sizeSlider.value=v;sizeMultiplier=v}
    if(p.has('zoom')){zoom=parseFloat(p.get('zoom'))}
    if(p.has('theme')){themeSelect.value=p.get('theme');applyTheme(p.get('theme'))}
    if(p.has('trails')){showTrails=p.get('trails')==='1';trailsBtn.classList.toggle('active',showTrails)}
    if(p.has('glow')){showGlow=p.get('glow')==='1';glowBtn.classList.toggle('active',showGlow)}
    if(p.has('lines')){showLines=p.get('lines')==='1';linesBtn.classList.toggle('active',showLines)}
  }catch(e){/* ignore malformed URL */ }
}

// ============================================================
// DOM REFS
// ============================================================
const countSlider=document.getElementById('countSlider');
const countDisplay=document.getElementById('countDisplay');
const speedSlider=document.getElementById('speedSlider');
const sizeSlider=document.getElementById('sizeSlider');
const themeSelect=document.getElementById('themeSelect');
const trailsBtn=document.getElementById('trailsBtn');
const glowBtn=document.getElementById('glowBtn');
const linesBtn=document.getElementById('linesBtn');
const resetBtn=document.getElementById('resetBtn');
const pauseBtn=document.getElementById('pauseBtn');
const audioBtn=document.getElementById('audioBtn');
const recordBtn=document.getElementById('recordBtn');
const exportBtn=document.getElementById('exportBtn');
const pauseOverlay=document.getElementById('pauseOverlay');

// ============================================================
// EVENT LISTENERS
// ============================================================
countSlider.addEventListener('input',()=>{
  const v=parseInt(countSlider.value);
  countDisplay.textContent=v;
  initDots(v);
});

speedSlider.addEventListener('input',()=>{
  speedMultiplier=parseFloat(speedSlider.value);
});

sizeSlider.addEventListener('input',()=>{
  sizeMultiplier=parseFloat(sizeSlider.value);
});

themeSelect.addEventListener('change',()=>{
  applyTheme(themeSelect.value);
});

trailsBtn.addEventListener('click',()=>{showTrails=!showTrails;trailsBtn.classList.toggle('active')});
glowBtn.addEventListener('click',()=>{showGlow=!showGlow;glowBtn.classList.toggle('active')});
linesBtn.addEventListener('click',()=>{showLines=!showLines;linesBtn.classList.toggle('active')});

resetBtn.addEventListener('click',()=>initDots(parseInt(countSlider.value)));

pauseBtn.addEventListener('click',()=>togglePause());

audioBtn.addEventListener('click',toggleAudio);
recordBtn.addEventListener('click',toggleRecording);
exportBtn.addEventListener('click',exportPNG);

canvas.addEventListener('click',e=>{
  if(paused) return;
  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left,y=e.clientY-r.top;
  const theme=THEMES[currentTheme];
  dots.push({
    angle:Math.random()*Math.PI*2,
    speed:(Math.random()*2+.3)*(Math.random()>.5?1:-1),
    radius:Math.sqrt((x-cx)**2+(y-cy)**2),
    color:theme.palette[dots.length%theme.palette.length],
    baseRadius:Math.sqrt((x-cx)**2+(y-cy)**2),
    baseSpeed:(Math.random()*2+.3)*(Math.random()>.5?1:-1),
  });
  countSlider.value=dots.length;
  countDisplay.textContent=dots.length;
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  zoom*=e.deltaY>0?.92:1.08;
  zoom=Math.max(.3,Math.min(3,zoom));
  if(!paused) syncStateToURL();
},{passive:false});

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  switch(e.key){
    case ' ':
      e.preventDefault();
      togglePause();
      break;
    case 'f':
    case 'F':
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
      break;
    case 'r':
    case 'R':
      initDots(parseInt(countSlider.value));
      break;
    case 't':case 'T':trailsBtn.click();break;
    case 'g':case 'G':glowBtn.click();break;
    case 'l':case 'L':linesBtn.click();break;
    case 'm':case 'M':audioBtn.click();break;
    case 'Escape':
      if(paused) togglePause();
      break;
    case '1':themeSelect.value='default';applyTheme('default');break;
    case '2':themeSelect.value='cyberpunk';applyTheme('cyberpunk');break;
    case '3':themeSelect.value='ocean';applyTheme('ocean');break;
    case '4':themeSelect.value='fire';applyTheme('fire');break;
    case '5':themeSelect.value='monochrome';applyTheme('monochrome');break;
  }
});

function togglePause(){
  paused=!paused;
  pauseBtn.textContent=paused?'▶':'⏸';
  pauseOverlay.classList.toggle('show',paused);
}

// ============================================================
// TOUCH GESTURES
// ============================================================
let touchDist=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoom*=d/touchDist;
    zoom=Math.max(.3,Math.min(3,zoom));
    touchDist=d;
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(e.touches.length===0&&touchDist===0&&!paused){
    const r=canvas.getBoundingClientRect();
    const t=e.changedTouches[0];
    const x=t.clientX-r.left,y=t.clientY-r.top;
    const theme=THEMES[currentTheme];
    dots.push({
      angle:Math.random()*Math.PI*2,
      speed:(Math.random()*2+.3)*(Math.random()>.5?1:-1),
      radius:Math.sqrt((x-cx)**2+(y-cy)**2),
      color:theme.palette[dots.length%theme.palette.length],
      baseRadius:Math.sqrt((x-cx)**2+(y-cy)**2),
      baseSpeed:(Math.random()*2+.3)*(Math.random()>.5?1:-1),
    });
    countSlider.value=dots.length;
    countDisplay.textContent=dots.length;
  }
  touchDist=0;
});

// ============================================================
// DRAW
// ============================================================
function dotPosition(dot){
  return {
    x:cx+Math.cos(dot.angle)*dot.radius*zoom,
    y:cy+Math.sin(dot.angle)*dot.radius*zoom,
  };
}

function drawDot(x,y,color,radius){
  if(showGlow){
    const grad=ctx.createRadialGradient(x,y,0,x,y,radius*8);
    grad.addColorStop(0,color+THEMES[currentTheme].dotAlpha);
    grad.addColorStop(1,color+'00');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(x,y,radius*8,0,Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle=color;
  ctx.shadowColor=showGlow?color:'transparent';
  ctx.shadowBlur=showGlow?20:0;
  ctx.beginPath();
  ctx.arc(x,y,radius,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,.3)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.arc(x,y,radius,0,Math.PI*2);
  ctx.stroke();
}

function draw(){
  if(paused){
    requestAnimationFrame(draw);
    return;
  }

  // Audio
  if(audioMode&&analyser&&audioData){
    analyser.getByteFrequencyData(audioData);
    const bass=Array.from(audioData.slice(0,10)).reduce((a,b)=>a+b,0)/10;
    const mid=Array.from(audioData.slice(10,30)).reduce((a,b)=>a+b,0)/20;
    const treble=Array.from(audioData.slice(30,60)).reduce((a,b)=>a+b,0)/30;
    const bassNorm=bass/255;
    const midNorm=mid/255;
    const trebleNorm=treble/255;
    for(let i=0;i<dots.length;i++){
      const d=dots[i];
      d.radius=d.baseRadius*(1+bassNorm*0.5);
      d.speed=d.baseSpeed*(0.5+midNorm*1.5);
    }
    if(trebleNorm>.5&&!showGlow) {showGlow=true;glowBtn.classList.add('active')}
    else if(trebleNorm<.1&&showGlow) {showGlow=false;glowBtn.classList.remove('active')}
  }else{
    for(let i=0;i<dots.length;i++){
      const d=dots[i];
      d.radius=d.baseRadius;
      d.speed=d.baseSpeed;
    }
  }

  const spd=speedMultiplier;
  const dotCount=dots.length;

  ctx.fillStyle=THEMES[currentTheme].bg;
  ctx.fillRect(0,0,W,H);

  // Trails
  if(showTrails&&trailHistory.length>1){
    for(let i=0;i<dotCount;i++){
      ctx.beginPath();
      let started=false;
      for(let h=0;h<trailHistory.length;h++){
        if(!trailHistory[h]||!trailHistory[h][i]) continue;
        const[px,py]=trailHistory[h][i];
        if(!started){ctx.moveTo(px,py);started=true}
        else ctx.lineTo(px,py);
      }
      ctx.strokeStyle=dots[i].color+'40';
      ctx.lineWidth=2;
      ctx.stroke();
    }
  }

  // Positions
  const positions=[];
  for(let i=0;i<dotCount;i++){
    const d=dots[i];
    d.angle+=d.speed*0.02*spd;
    positions.push(dotPosition(d));
  }

  // History
  if(trailHistory.length>240) trailHistory.shift();
  trailHistory.push(positions.map((p,i)=>[p.x,p.y]));

  // Lines
  if(showLines&&dotCount>1){
    ctx.strokeStyle='rgba(255,255,255,.04)';
    ctx.lineWidth=1;
    for(let i=0;i<dotCount;i++){
      for(let j=i+1;j<dotCount;j++){
        ctx.beginPath();
        ctx.moveTo(positions[i].x,positions[i].y);
        ctx.lineTo(positions[j].x,positions[j].y);
        ctx.stroke();
      }
    }
  }

  // Dots
  const dotRadius=Math.min(6,24/Math.sqrt(dotCount))*sizeMultiplier;
  for(let i=0;i<dotCount;i++){
    const d=dots[i];
    const p=positions[i];
    drawDot(p.x,p.y,d.color,dotRadius);
  }

  frame++;
  requestAnimationFrame(draw);
}

// ============================================================
// START
// ============================================================
restoreStateFromURL();
initDots(parseInt(countSlider.value));
draw();
</script>
</body>
</html>
